name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      writing-app: ${{ steps.out.outputs.writing-app }}
      daily-log: ${{ steps.out.outputs.daily-log }}
      jobsearch: ${{ steps.out.outputs.jobsearch }}
      infra: ${{ steps.out.outputs.infra }}
      home: ${{ steps.out.outputs.home }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            writing-app:
              - 'apps/writing-app/**'
              - 'packages/ui/**'
            daily-log:
              - 'apps/daily-log/**'
              - 'packages/ui/**'
            jobsearch:
              - 'apps/jobsearch/**'
              - 'packages/ui/**'
            infra:
              - 'docker-compose.yml'
              - 'caddy/**'
            home:
              - 'apps/home/**'
              - 'packages/ui/**'
      - id: out
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "writing-app=true" >> $GITHUB_OUTPUT
            echo "daily-log=true"   >> $GITHUB_OUTPUT
            echo "jobsearch=true"   >> $GITHUB_OUTPUT
            echo "infra=true"       >> $GITHUB_OUTPUT
            echo "home=true"        >> $GITHUB_OUTPUT
          else
            echo "writing-app=${{ steps.filter.outputs.writing-app }}" >> $GITHUB_OUTPUT
            echo "daily-log=${{ steps.filter.outputs.daily-log }}"     >> $GITHUB_OUTPUT
            echo "jobsearch=${{ steps.filter.outputs.jobsearch }}"     >> $GITHUB_OUTPUT
            echo "infra=${{ steps.filter.outputs.infra }}"             >> $GITHUB_OUTPUT
            echo "home=${{ steps.filter.outputs.home }}"               >> $GITHUB_OUTPUT
          fi

  set-matrix:
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has-apps: ${{ steps.build.outputs.has-apps }}
    steps:
      - id: build
        run: |
          includes=()
          [[ "${{ needs.detect.outputs.writing-app }}" == "true" ]] && includes+=('{"app":"writing-app","dir":"apps/writing-app"}')
          [[ "${{ needs.detect.outputs.daily-log }}"   == "true" ]] && includes+=('{"app":"daily-log","dir":"apps/daily-log"}')
          [[ "${{ needs.detect.outputs.jobsearch }}"   == "true" ]] && includes+=('{"app":"jobsearch","dir":"apps/jobsearch"}')
          [[ "${{ needs.detect.outputs.home }}"        == "true" ]] && includes+=('{"app":"home","dir":"apps/home"}')
          if [ ${#includes[@]} -gt 0 ]; then
            joined=$(IFS=,; echo "${includes[*]}")
            echo "matrix={\"include\":[$joined]}" >> $GITHUB_OUTPUT
            echo "has-apps=true" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "has-apps=false" >> $GITHUB_OUTPUT
          fi

  deploy-app:
    needs: [detect, set-matrix]
    if: needs.set-matrix.outputs.has-apps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dir }}/Dockerfile
          push: true
          tags: ghcr.io/dpetryshchuk/ai-os/${{ matrix.app }}:latest
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull ${{ matrix.app }}
            docker compose up -d ${{ matrix.app }}

  deploy-infra:
    needs: detect
    if: needs.detect.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy infra to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull --quiet || true
            docker compose up -d --remove-orphans
            sudo systemctl reload-or-restart caddy
