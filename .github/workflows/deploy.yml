name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to deploy — comma-separated (writing-app,daily-log,jobsearch,home) or leave blank for all'
        required: false
        default: 'all'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      writing-app: ${{ steps.filter.outputs.writing-app }}
      daily-log: ${{ steps.filter.outputs.daily-log }}
      jobsearch: ${{ steps.filter.outputs.jobsearch }}
      infra: ${{ steps.filter.outputs.infra }}
      home: ${{ steps.filter.outputs.home }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            writing-app:
              - 'apps/writing-app/**'
              - 'packages/ui/**'
            daily-log:
              - 'apps/daily-log/**'
              - 'packages/ui/**'
            jobsearch:
              - 'apps/jobsearch/**'
              - 'packages/ui/**'
            infra:
              - 'docker-compose.yml'
              - 'caddy/**'
            home:
              - 'apps/home/**'
              - 'packages/ui/**'

  set-matrix:
    needs: detect
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has-apps: ${{ steps.build.outputs.has-apps }}
    steps:
      - id: build
        run: |
          # workflow_dispatch with blank or "all" → deploy every app
          MANUAL="${{ github.event.inputs.apps }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "$MANUAL" || "$MANUAL" == "all" ]]; then
              MANUAL="writing-app,daily-log,jobsearch,home"
            fi
          fi

          includes=()
          if [[ "$MANUAL" == *"writing-app"* || "${{ needs.detect.outputs.writing-app }}" == "true" ]]; then
            includes+=('{"app":"writing-app","dir":"apps/writing-app"}')
          fi
          if [[ "$MANUAL" == *"daily-log"* || "${{ needs.detect.outputs.daily-log }}" == "true" ]]; then
            includes+=('{"app":"daily-log","dir":"apps/daily-log"}')
          fi
          if [[ "$MANUAL" == *"jobsearch"* || "${{ needs.detect.outputs.jobsearch }}" == "true" ]]; then
            includes+=('{"app":"jobsearch","dir":"apps/jobsearch"}')
          fi
          if [[ "$MANUAL" == *"home"* || "${{ needs.detect.outputs.home }}" == "true" ]]; then
            includes+=('{"app":"home","dir":"apps/home"}')
          fi

          if [ ${#includes[@]} -gt 0 ]; then
            joined=$(IFS=,; echo "${includes[*]}")
            echo "matrix={\"include\":[$joined]}" >> $GITHUB_OUTPUT
            echo "has-apps=true" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "has-apps=false" >> $GITHUB_OUTPUT
          fi

  deploy-app:
    needs: [detect, set-matrix]
    if: needs.set-matrix.outputs.has-apps == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dir }}/Dockerfile
          push: true
          tags: ghcr.io/dpetryshchuk/ai-os/${{ matrix.app }}:latest
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull ${{ matrix.app }}
            docker compose up -d ${{ matrix.app }}

  deploy-infra:
    needs: detect
    if: needs.detect.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy infra to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull --quiet || true
            docker compose up -d --remove-orphans
            sudo systemctl reload-or-restart caddy
