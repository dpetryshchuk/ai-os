name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            aios:
              - 'aios/**'
      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.aios == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.aios == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.aios == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: aios/Dockerfile
          push: true
          tags: ghcr.io/dpetryshchuk/ai-os/aios:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to VPS
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.aios == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull aios
            docker compose up -d aios celery-worker celery-beat

  deploy-onekeyflow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            onekeyflow:
              - 'onekeyflow/**'
      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.onekeyflow == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.onekeyflow == 'true'
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.onekeyflow == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: onekeyflow/Dockerfile
          push: true
          tags: ghcr.io/dpetryshchuk/ai-os/onekeyflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to VPS
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.onekeyflow == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose pull onekeyflow
            docker compose up -d onekeyflow

  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            infra:
              - 'docker-compose.yml'
              - 'caddy/**'
      - name: Deploy infra to VPS
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.infra == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/dima/ai-os
            git fetch origin master && git reset --hard origin/master
            docker compose up -d --remove-orphans --pull=never || true
            sudo systemctl reload-or-restart caddy
